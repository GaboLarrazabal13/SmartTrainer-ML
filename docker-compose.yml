services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: smarttrainer_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      # Local dependency on 'db' removed. Now uses DATABASE_URL directly from .env (Supabase)
    networks:
      - smarttrainer_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: smarttrainer_web
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - smarttrainer_net

networks:
  smarttrainer_net:
    driver: bridge
